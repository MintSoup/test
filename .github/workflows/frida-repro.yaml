name: frida freeifaddrs repro

on:
  push:
    paths:
      - "frida-repro/**"
      - ".github/workflows/frida-repro.yaml"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_BACKTRACE: "1"

jobs:
  repro:
    runs-on: macos-latest
    steps:
      # Checks out THIS repo (the repro lives here). No mirrord involved.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      # frida-gum auto-downloads its devkit; bindgen uses the runner's libclang.
      - name: Build & run repro
        working-directory: frida-repro
        run: cargo run
