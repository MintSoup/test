name: getifaddrs test

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  MIRRORD_TELEMETRY: false
  # Logging: mirrord layer/intproxy traces + full Rust backtraces on panic.
  RUST_LOG: "warn,mirrord=trace"
  RUST_BACKTRACE: "1"
  # Make the AddressSanitizer report loud and well-symbolized so the UAF in the
  # getifaddrs hook's list copy is easy to read. MallocNanoZone=0 avoids the
  # macOS malloc-zone conflict ASan warns about.
  ASAN_OPTIONS: "abort_on_error=1:symbolize=1:print_stats=1:detect_leaks=0"
  MallocNanoZone: "0"

jobs:
  getifaddrs:
    runs-on: macos-latest
    env:
      # On macOS the layer is a universal .dylib; the layer-tests also need the CLI binary.
      MIRRORD_LAYER_FILE: ${{ github.workspace }}/target/universal-apple-darwin/debug/libmirrord_layer.dylib
      MIRRORD_LAYER_FILE_MACOS_ARM64: ${{ github.workspace }}/target/aarch64-apple-darwin/debug/libmirrord_layer.dylib
      MIRRORD_TESTS_USE_BINARY: ${{ github.workspace }}/target/universal-apple-darwin/debug/mirrord
    steps:
      - name: Checkout mintsoup/mirrord @ fix-getifaddrs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mintsoup/mirrord
          ref: fix-getifaddrs

      # The macOS build targets both arches explicitly, so drop the pinned single-target file.
      - name: Drop pinned toolchain file
        run: rm rust-toolchain.toml

      # Installs the toolchain and caches ~/.cargo + ./target via Swatinem/rust-cache.
      - name: Setup Rust toolchain (with cargo cache)
        uses: metalbear-co/setup-rust-toolchain@a8d42d5aa259519dac1faeee20e37c1fb43453a3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
          components: rustfmt, clippy
          target: x86_64-apple-darwin, aarch64-apple-darwin
          toolchain: nightly-2026-02-24

      - name: Install Protoc
        uses: metalbear-co/setup-protoc@770e54d44679c8e1d8fdc06d1d9268fa79fbefb4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # The getifaddrs C test app is compiled with clang + ASan by this script.
      - name: Build C test apps
        run: ./scripts/build_c_apps.sh

      # MECHANISM CHECK: sanitizers ship a `getifaddrs` interceptor (to unpoison the
      # list they return) but no `freeifaddrs` one. On macOS that interceptor is wired
      # in via dyld interposing, so the app's `getifaddrs` call is redirected to ASan
      # and never reaches the libsystem entry frida patched -- while `freeifaddrs` has
      # no interceptor and hits frida's hook normally. Expect to see wrap/interceptor
      # symbols for getifaddrs and nothing for freeifaddrs.
      - name: Inspect ASan interceptor symbols (getifaddrs vs freeifaddrs)
        run: |
          asan="$(clang -print-resource-dir)/lib/darwin/libclang_rt.asan_osx_dynamic.dylib"
          echo "asan dylib: $asan"
          ls -l "$asan" 2>/dev/null || find / -name 'libclang_rt.asan_osx_dynamic.dylib' 2>/dev/null
          echo "=== symbols matching 'ifaddr' ==="
          nm "$asan" 2>/dev/null | grep -i ifaddr || echo "(no ifaddr symbols)"

      # BEHAVIOR CHECK: rebuild the app WITHOUT AddressSanitizer. If ASan's interposed
      # interceptor is what shadows frida's getifaddrs hook, then without ASan the
      # `getifaddrs_detour` should finally run ("hook: calling original" prints), IPv6
      # gets hidden, and the test passes. -g keeps stacks readable.
      - name: Rebuild getifaddrs app WITHOUT ASan (hook interception experiment)
        run: |
          clang -g -O1 -fno-omit-frame-pointer \
            mirrord/layer-tests/tests/apps/getifaddrs/getifaddrs.c \
            -o mirrord/layer-tests/tests/apps/getifaddrs/out.c_test_app

      # Builds the CLI binary and the universal layer .dylib in one shot.
      # --no-monitor/--no-wizard skip the frontend builds (no pnpm needed); the
      # CLI's build.rs stubs an empty monitor dist so rust-embed still compiles.
      - name: Build CLI and universal layer
        run: cargo xtask build-cli --platform macos-universal --no-wizard --no-monitor

      - name: Run getifaddrs test (--nocapture)
        run: cargo test -p mirrord-layer-tests --no-default-features getifaddrs -- --nocapture

      - name: Save intproxy logs
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: intproxy_logs_macos
          path: /tmp/intproxy_logs/macos
